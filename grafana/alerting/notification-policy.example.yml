apiVersion: 1

# Warning: provisioning policies replaces the Grafana notification policy tree
# for the organization. Export and review the existing policy tree before
# applying this in production.
policies:
  - orgId: 1
    receiver: ms-teams-dba-critical
    group_by:
      - alertname
      - instance
      - database
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: ms-teams-dba-critical
        object_matchers:
          - ["team", "=", "dba"]
          - ["severity", "=~", "critical|warning"]
        group_by:
          - alertname
          - instance
          - database
          - severity
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 2h
