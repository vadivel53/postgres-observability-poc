name: postgres-observability-poc

services:
  postgres-active:
    image: postgres:17
    container_name: pgobs-postgres-active
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-observability_demo}
      PGWATCH_USER: ${PGWATCH_USER:-pgwatch}
      PGWATCH_PASSWORD: ${PGWATCH_PASSWORD:-pgwatch_password}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator_password}
      PGDATA: /var/lib/postgresql/data
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - active-data:/var/lib/postgresql/data
      - ./postgres/active/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/active/conf/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/active/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-observability_demo}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - observability

  postgres-passive:
    image: postgres:17
    container_name: pgobs-postgres-passive
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-observability_demo}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator_password}
      PGDATA: /var/lib/postgresql/data
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - passive-data:/var/lib/postgresql/data
      - ./postgres/passive/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
      - ./postgres/passive/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/passive/conf/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "5433:5432"
    depends_on:
      postgres-active:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-observability_demo}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - observability

  pgwatch:
    image: cybertecpostgresql/pgwatch-demo:${PGWATCH_VERSION:-5.0.0}
    container_name: pgobs-pgwatch
    restart: unless-stopped
    environment:
      PW_TESTDB: "false"
      PW_GRAFANA_USER: ${PGWATCH_GRAFANA_USER:-admin}
      PW_GRAFANA_PASSWORD: ${PGWATCH_GRAFANA_PASSWORD:-pgwatchadmin}
    ports:
      - "3000:3000"
      - "8080:8080"
      - "15432:5432"
    volumes:
      - pgwatch-pg:/var/lib/postgresql/data
      - pgwatch-grafana:/var/lib/grafana
      - pgwatch-config:/pgwatch/persistent-config
    depends_on:
      postgres-active:
        condition: service_healthy
      postgres-passive:
        condition: service_healthy
    networks:
      - observability

  pgbadger:
    build:
      context: ./pgbadger
    container_name: pgobs-pgbadger
    profiles: ["reports"]
    environment:
      ACTIVE_LOG_DIR: /pgdata-active/log
      PASSIVE_LOG_DIR: /pgdata-passive/log
      REPORT_DIR: /reports
    volumes:
      - active-data:/pgdata-active:ro
      - passive-data:/pgdata-passive:ro
      - ./pgbadger/reports:/reports
    depends_on:
      postgres-active:
        condition: service_healthy
      postgres-passive:
        condition: service_healthy
    networks:
      - observability

  nginx:
    image: nginx:1.27-alpine
    container_name: pgobs-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pgbadger/reports:/usr/share/nginx/html:ro
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  active-data:
  passive-data:
  pgwatch-pg:
  pgwatch-grafana:
  pgwatch-config:
